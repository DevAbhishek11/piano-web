kind = "web"
previewPath = "/"
title = "Web Piano"
version = "1.0.0"
id = "artifacts/piano-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22231

[services.development]
run = "pnpm --filter @workspace/piano-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/piano-app", "run", "build" ]
publicDir = "artifacts/piano-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22231"
BASE_PATH = "/"
